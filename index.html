  p2+='<li>Curto-circuito em partes elétricas, fusão de outros distúrbios elétricos causados aos dínamos, alternadores, motores, transformadores, condutores, chaves e demais acessórios;</li>';
  p2+='<li>Operações em locais impróprios para o equipamento.</li>';
  p2+='<li>Fornecimento de combustível do equipamento Oleo Diesel e GLP. No caso dos equipamentos elétricos o fornecimento de energia e extensões necessárias ao carregamento das baterias é de responsabilidade da Locatária, verificando e conferindo a voltagem correta.</li>';

  p2+='<li>Devolução do equipamento nas mesmas condições em que recebeu na data de sua entrega, salvo os desgastes naturais, juntamente com a Nota Fiscal de Devolução. Em caso de não devolver o equipamento no prazo da proposta, considerar-se renovação automática nas mesmas condições.</li>';
  p2+='<li>Disponibilizar os equipamentos para as manutenções nos horários previamente acordados entre as partes e providenciar local para lavação e lubrificação dos mesmos.</li>';
  p2+='<li>Entrar em contato com a Locadora em caso de danos ou problemas no funcionamento do equipamento pelo telefone '+CO.p1+' ou '+CO.p2+' pois somente técnicos da Locadora estão autorizados a proceder nos devidos reparos.</li>';

  p2+='<li>Equipamentos alugados em uma distância acima de 350km da unidade da locadora, os atendimentos solicitados pela Locatária serão cobrados R$ 1,50 km rodado do técnico mais 100,00 de hospedagem e alimentação.</li>';

  p3+='</table>';

  p3+='<div class="st2">Devolução do(s) equipamento(s):</div>';
  p3+='<ul>';
  p3+='<li>Lembramos que o contrato de locação somente se encerra com a entrada do equipamento nas dependências da LOCADORA, devendo estar acompanhado da nota fiscal de devolução da LOCATÁRIA, conforme previsto em Lei. O descumprimento desta está sujeita ao não recebimento do equipamento e cobrança de diária extra até regularização da situação, implicando em uma total responsabilidade da empresa LOCATÁRIA, pelas infrações fiscais decorrentes de sua emissão ou omissão.</li>';
  p3+='<li>Caso ocorra devoluções dos equipamentos antes do período contratado os valores acordados nesta proposta não sofrerão alterações</li>';
  p3+='<li>Caso seja necessário o abastecimento do equipamento pela locadora no ato da devolução, será cobrado o valor de R$ 6,50 (seis reais e cinquenta centavos) o litro de combustível.</li>';

  p3+='<li>Em se tratando de contrato de locação por prazo determinado, antes do vencimento contratual, não poderá a LOCADORA reaver o bem locado. De igual modo, não poderá a LOCATARIA devolver o equipamento locado antes do término final do contrato.</li>';

  p3+='<div class="st2">Tributação</div>';
