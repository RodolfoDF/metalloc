  function saveInv(fn){var n=typeof fn==="function"?fn(_inv[0]):fn;_inv[1](n);n.forEach(function(i){sb.from("invoices").upsert({id:i.id,rental_id:i.rentalId,equipment_id:i.equipmentId,client_id:i.clientId,type:i.type,period_value:i.periodValue,freight:i.freight,total:i.total,due_date:i.dueDate,status:i.status,owners:i.owners||[],invoice_number:i.invoiceNumber||null,period_start:i.periodStart||null,period_end:i.periodEnd||null,qty:i.qty||1}).then(function(){});});}
  function createInvoice(rentalId,eqId,clId,type,pv,fr,vencDays,owners,periodStart,periodEnd,qty){var dd=new Date();dd.setDate(dd.getDate()+parseInt(vencDays||28));var num=String(_inv[0].length+1).padStart(3,"0");var inv={id:uid(),invoiceNumber:num,rentalId:rentalId,equipmentId:eqId,clientId:clId,type:type,periodValue:pv,freight:type==="primeira"?fr:0,total:type==="primeira"?pv+fr:pv,dueDate:dd.toISOString().slice(0,10),status:"pendente",owners:owners||[],periodStart:periodStart||td(),periodEnd:periodEnd||"",qty:qty||1};saveInv(function(prev){return prev.concat([inv]);});return inv;}
  function saveCar(fn){var n=typeof fn==="function"?fn(_car[0]):fn;_car[1](n);n.forEach(function(c){sb.from("carriers").upsert({id:c.id,name:c.name,phone:c.phone,pix:c.pix}).then(function(){});});var ids=n.map(function(c){return c.id;});_car[0].forEach(function(c){if(ids.indexOf(c.id)===-1)sb.from("carriers").delete().eq("id",c.id).then(function(){});});}
  function saveFo(fn){var n=typeof fn==="function"?fn(_fo[0]):fn;_fo[1](n);n.forEach(function(f){sb.from("freight_orders").upsert({id:f.id,carrier_id:f.carrierId,rental_id:f.rentalId,equipment_id:f.equipmentId,client_id:f.clientId,type:f.type,freight_date:f.freightDate,value:f.value,status:f.status,notes:f.notes||""}).then(function(){});});}

  if(checking)return<div style={{background:bg,minHeight:"100vh",display:"flex",justifyContent:"center",alignItems:"center",flexDirection:"column"}}><img src={LOGO} style={{height:56}}/><div style={{color:"#64748b",marginTop:16,fontSize:14}}>{"Carregando..."}</div></div>;
  if(!authUser||!profile)return<LoginPage onLogin={handleLogin}/>;
  if(!loaded)return<div style={{background:bg,minHeight:"100vh",display:"flex",justifyContent:"center",alignItems:"center",flexDirection:"column"}}><img src={LOGO} style={{height:56}}/><div style={{color:"#64748b",marginTop:16,fontSize:14}}>{"Carregando dados..."}</div></div>;
  // Auto-mark overdue invoices
  var todayDate=new Date().toISOString().slice(0,10);
  var hasOverdue=false;
  _inv[0].forEach(function(i){if(i.status==="pendente"&&i.dueDate&&i.dueDate<todayDate){hasOverdue=true;}});
  if(hasOverdue){saveInv(function(prev){return prev.map(function(i){if(i.status==="pendente"&&i.dueDate&&i.dueDate<todayDate)return{...i,status:"vencida"};return i;});});}
  var role=profile.role||"comercial";var perms=PERMS[role]||PERMS.comercial;
  var ar=_rn[0].filter(function(r){return r.status==="ativa";});var alc=ar.filter(function(r){return du(r)<=5;}).length;var pp=_pr2[0].filter(function(x){return x.status==="pendente";}).length;
  var content=null;var pn=pg[0].name;
  if(pn==="dashboard")content=<Dashboard equipments={_eq[0]} clients={_cl[0]} rentals={_rn[0]} setPage={pg[1]} createInvoice={createInvoice}/>;
  else if(pn==="equipments")content=<EquipPage equipments={_eq[0]} saveEq={saveEq} rentals={_rn[0]} clients={_cl[0]} perm={perms.equipments}/>;
  else if(pn==="clients")content=<ClientPage clients={_cl[0]} saveCl={saveCl} perm={perms.clients}/>;
  else if(pn==="rentals")content=<RentalPage rentals={_rn[0]} saveRn={saveRn} equipments={_eq[0]} clients={_cl[0]} perm={perms.rentals}/>;
  else if(pn==="proposals")content=<ProposalPage equipments={_eq[0]} clients={_cl[0]} rentals={_rn[0]} proposals={_pr2[0]} savePr={savePr} saveRn={saveRn} createInvoice={createInvoice} perm={perms.proposals} canApprove={perms.approve}/>;
  else if(pn==="users"&&perms.users)content=<UsersPage users={_us[0]} setUsers={_us[1]}/>;
  else if(pn==="financeiro"&&perms.financeiro)content=<FinanceiroPage equipments={_eq[0]} rentals={_rn[0]} clients={_cl[0]} invoices={_inv[0]} saveInv={saveInv} carriers={_car[0]} saveCar={saveCar} freightOrders={_fo[0]} saveFo={saveFo}/>;
  var tabs=[{k:"dashboard",l:"Painel",i:"dash"}];
  if(perms.equipments)tabs.push({k:"equipments",l:"Equip.",i:"eq"});if(perms.clients)tabs.push({k:"clients",l:"Clientes",i:"cl"});if(perms.rentals)tabs.push({k:"rentals",l:"Locações",i:"rn"});if(perms.proposals)tabs.push({k:"proposals",l:"Proposta",i:"pr"});if(perms.financeiro)tabs.push({k:"financeiro",l:"Financ.",i:"fin"});if(perms.users)tabs.push({k:"users",l:"Usuários",i:"usr"});
  return(<div style={{fontFamily:"'DM Sans','Segoe UI',sans-serif",minHeight:"100vh",background:bg,color:"#e2e8f0",display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto"}}>
    <div style={{padding:"14px 16px 10px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:20,background:"linear-gradient(180deg,rgba(10,14,26,0.98) 70%,rgba(10,14,26,0) 100%)",backdropFilter:"blur(12px)"}}>
      <img src={LOGO} style={{height:32,objectFit:"contain"}}/>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        {alc>0&&<button onClick={function(){pg[1]({name:"dashboard"});}} style={{background:"rgba(245,166,35,0.15)",border:"1px solid rgba(245,166,35,0.3)",borderRadius:20,padding:"4px 10px",display:"flex",alignItems:"center",gap:4,color:"#f5a623",fontSize:12,fontWeight:700,cursor:"pointer"}}><Ic n="bell" s={14} c="#f5a623"/>{String(alc)}</button>}
        {pp>0&&<button onClick={function(){pg[1]({name:"proposals"});}} style={{background:"rgba(99,102,241,0.15)",border:"1px solid rgba(99,102,241,0.3)",borderRadius:20,padding:"4px 10px",display:"flex",alignItems:"center",gap:4,color:"#6366f1",fontSize:12,fontWeight:700,cursor:"pointer"}}><Ic n="pr" s={14} c="#6366f1"/>{String(pp)}</button>}
        <span style={{fontSize:11,color:"#475569",fontWeight:600}}>{profile.name.split(" ")[0]}</span>
        <span style={bg2(RC[role])}>{RL[role]}</span>
        <button onClick={handleLogout} style={{background:"none",border:"none",cursor:"pointer",padding:4}}><Ic n="logout" s={16} c="#64748b"/></button>
      </div>
    </div>
    <div style={{flex:1,padding:"0 16px 100px"}}>{content}</div>
    <nav style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,display:"flex",justifyContent:"space-around",padding:"10px 0 20px",background:"linear-gradient(0deg,rgba(10,14,26,0.98) 70%,rgba(10,14,26,0) 100%)",backdropFilter:"blur(16px)",zIndex:30,borderTop:"1px solid rgba(255,255,255,0.05)"}}>
      {tabs.map(function(t){var a=pn===t.k;return<button key={t.k} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,fontSize:10,fontWeight:600,color:a?"#f5a623":"#64748b",cursor:"pointer",background:"none",border:"none",padding:"4px 10px"}} onClick={function(){pg[1]({name:t.k});}}><Ic n={t.i} s={20} c={a?"#f5a623":"#64748b"}/><span>{t.l}</span></button>;})}
    </nav>
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script></body></html>
